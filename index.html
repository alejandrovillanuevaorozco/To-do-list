<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="src/img/icons.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>To-do-list</title>
  </head>
  <body>
    <header class=" flex items-center justify-center bg-[url(src/img/fondo-header.jpg)] w-full h-70 p-0 m-0">
      <p class="font-serif text-sky-950 text-6xl text-center  p-0 m-0">DAILY TO-DO LIST</p>
    </header>
    <div>
      <p class="font-serif text-5xl">Daily Tasks:</p>
      <input type="checkbox">Tarea 1
      <button id="add_task" class="font-serif bg-sky-950 uppercase text-white font-bold py-2 px-4 fixed bottom-10 right-10 rounded hover:bg-sky-500">Add tasks</button>
      <dialog id="task_modal" class="rounded-xl p-0 top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 backdrop:bg-black/40">
        <form method="dialog" class="flex flex-col w-400px h-500px border border-sky-950 px-5 py-4 bg-white rounded-xl">
          <input type="text" placeholder="Title" class="font-serif text-center text-xl my-5 border-b outline-none">
          <textarea placeholder="Description" rows="4" class="font-serif w-full rounded-lg border border-gray-300 px-4 py-3 resize-none"></textarea>
          <p class="font-serif text-sm text-center my-5">Fecha y hora</p>
          <input type="datetime-local" class="font-serif px-4 border rounded-lg py-2">
          <p class="font-serif text-sm text-center my-5">Priority</p>
          <div class="flex flex-row justify-around">
            <label class="flex items-center gap-2">
              <span>Low</span>
              <input type="radio" name="priority" value="low" class="w-4 h-4">
            </label>
            <label class="flex items-center gap-2">
              <span>Medium</span>
              <input type="radio" name="priority" value="medium" class="w-4 h-4">
            </label>
            <label class="flex items-center gap-2">
              <span>High</span>
              <input type="radio" name="priority" value="high" class="w-4 h-4">
            </label>
          </div>
          <div class="flex flex-row justify-between my-10">
            <button value="cancel" class="font-serif bg-sky-950 uppercase text-white py-2 px-4 rounded hover:bg-sky-500">Cancel</button>
            <button value="default" class="font-serif bg-sky-950 uppercase text-white py-2 px-4 rounded hover:bg-sky-500">Save</button>
          </div>
        </form>
      </dialog>
    </div>
    <script src="src/btn_add_task.js"></script>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
